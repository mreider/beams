on: 
  workflow_dispatch:
      branch:
        description: 'branch'     
        default: 'master'
        required: true
jobs:
  build-and-publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2.3.2
        name: Check out code
        with:
          ref: '${{ github.event.inputs.branch}}'
      - uses: mr-smithers-excellent/docker-build-push@v5
        name: Build and Publish Frontend
        with:
          image: beams
          tags: ${{ github.run_number }}, latest
          registry: ghcr.io
          githubOrg: mreider
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }} 
          directory: ./app
          dockerfile: ./app/Dockerfile
  deploy:
      needs: [build-and-publish]
      runs-on: ubuntu-latest
      steps:
        - name: run number with offset
          env:
              NUM: ${{ github.run_number }}
              ACTIONS_ALLOW_UNSECURE_COMMANDS: True
          run: |
              echo ::set-env name=GITHUB_RUN_NUMBER_WITH_OFFSET::$(($NUM+15))
        - uses: actions/checkout@v2.3.2
          name: Check out code
        - name: Update deployment file (staging)
          run: |
            find ./kubernetes -type f -name '*.yaml' -exec sed -i -E 's|image: ([a-z]*) *$|image: ghcr.io/mreider/\1:<TAG>|' {} \;
            find ./kubernetes -type f -name '*.yaml' -exec sed -i 's|<TAG>|'${{ env.GITHUB_RUN_NUMBER_WITH_OFFSET }}'|' {} \;
            rm -rf kubernetes_generated/*;
            cp -rf kubernetes/. kubernetes_generated/
        - name: Update deployment files
          uses: test-room-7/action-update-file@v1
          with:
            file-path: kubernetes_generated/*.yaml
            commit-msg: Bump version to ${{ env.GITHUB_RUN_NUMBER_WITH_OFFSET }}
            github-token: ${{ secrets.GITHUB_TOKEN }}
