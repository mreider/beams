on: 
  push:
      branches:
        - main
jobs:
  build-and-publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2.3.2
        name: Check out code
        with:
          ref: '${{ github.event.inputs.branch}}'
      - uses: mr-smithers-excellent/docker-build-push@v5
        name: Build and publish image
        with:
          image: beams
          tags: ${{ github.run_number }}, latest
          registry: ghcr.io
          githubOrg: mreider
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }} 
          directory: ./app
          dockerfile: ./app/Dockerfile
      - name: Run kustomize
        run: |
          kustomize edit set image ghcr.io/mreider/beams=ghcr.io/mreider/beams:${{ github.run_number }}
          kustomize build > kubernetes/beams.yaml
      - name: Update deployment files
        uses: test-room-7/action-update-file@v1
        with:
          file-path: kubernetes/beams.yaml
          commit-msg: image tag update to ${{ github.run_number }}
          github-token: ${{ secrets.GH_TOKEN }}
    