apiVersion: v1
kind: Service
metadata:
  name: mongodb
spec:
  selector:
    app: mongodb
    env: test
  ports:
  - port: 27017
    targetPort: 27017 
    protocol: TCP
--- 
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb   
  labels:
    app: mongodb
    env: test
spec: 
  selector:
    matchLabels:
      app: mongodb
  replicas: 1
  template:  
    metadata:
      labels:
        app: mongodb
    spec:
      containers: 
        - name: mongo
          resources:  
            requests:    
              cpu: 50m
              memory: 50Mi
            limits:    
              cpu: 100m
              memory: 100Mi
          image: mongo:4.0.9
          command:
            - mongod
            - "--bind_ip"
            - "0.0.0.0"
          imagePullPolicy: Always
          ports:
            - containerPort: 27017
              name: mongo
              hostPort: 27017
              protocol: TCP
          volumeMounts:
              - mountPath: /data/db
                name: mongodb-volume
      volumes:
        - name: mongodb-volume
          hostPath:
            path: /home/debian/mongodb 
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: transactions
  labels:
    app: transactions
spec:
  replicas: 1
  selector:
    matchLabels:
      app: transactions
  template:
    metadata:
      labels:
        app: transactions
    spec:
      containers:
      - name: transactions
        image: ghcr.io/mreider/beam/beam:latest
        resources:
          requests:
            cpu: 100m
            memory: 32Mi
          limits:
            memory: 64Mi
            cpu: 100m
        command:
            - node
            - "transactionServer.js"
        ports:
        - containerPort: 3000
          name: transactions
---
