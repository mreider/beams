        - containerPort: 3000
          name: frontend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: calculations
  labels:
    app: calculations
spec:
  replicas: 3
  selector:
    matchLabels:
      app: calculations
  template:
    metadata:
      labels:
        app: calculations
    spec:
      priorityClassName: high-priority
      containers:
      - name: calculations
        image: ghcr.io/mreider/beams:35
        command:
          - node
          - "calculationServer.js"
        resources:
          requests:
            cpu: 100m
            memory: 32Mi
          limits:
            memory: 64Mi
            cpu: 100m
        ports:
        - containerPort: 3000
          name: calculations
---
